[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    smoke: fast, high-value checks that gate every build
    regression: full-depth functional coverage
    api: WooCommerce Store API tests (no browser)
    cart: cart-related scenarios
    search: search-related scenarios
    product: product detail page scenarios
    account: login/register/my-account scenarios
    checkout: checkout page scenarios (non-destructive only - no real orders placed)

addopts =
    -ra
    --strict-markers
    --tb=short
    --html=reports/html/report.html
    --self-contained-html
    --junitxml=reports/junit/results.xml
    --alluredir=reports/allure-results
    --reruns 2
    --reruns-delay 2

filterwarnings =
    ignore::DeprecationWarning
